# VulnHawk Nginx Configuration
# Replace YOUR_DOMAIN with your actual domain (e.g. vulnhawk.example.com)

events {
    worker_connections 1024;
}

http {

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name YOUR_DOMAIN;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # -- MCP SSE endpoint (requires long-lived connections) --
        location /mcp/ {
            proxy_pass         http://vulnhawk:8080;
            proxy_http_version 1.1;

            # SSE-specific: disable buffering so events stream immediately
            proxy_buffering    off;
            proxy_cache        off;
            proxy_set_header   Connection '';
            chunked_transfer_encoding on;

            # Long timeout for SSE connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # -- Main app + REST API (long timeout for AI scans 3-8 min) --
        location / {
            proxy_pass         http://vulnhawk:8080;
            proxy_http_version 1.1;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
