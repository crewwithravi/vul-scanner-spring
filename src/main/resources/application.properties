spring.application.name=vul-scanner-spring
server.port=9090

# --- Spring AI: Ollama (default LLM backend) ---
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_MODEL:llama3.1}
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.chat.options.num-ctx=32768

# --- Spring AI: OpenAI ---
# To enable: export SPRING_AI_OPENAI_API_KEY=sk-...  then set LLM_VENDOR=openai
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o}
spring.ai.openai.chat.options.temperature=0.2

# --- Spring AI: Anthropic Claude ---
# To enable: export SPRING_AI_ANTHROPIC_API_KEY=sk-ant-...  then set LLM_VENDOR=anthropic
spring.ai.anthropic.chat.options.model=${ANTHROPIC_MODEL:claude-sonnet-4-6}
spring.ai.anthropic.chat.options.temperature=0.2

# --- Spring AI: Google Gemini ---
# To enable: export SPRING_AI_GOOGLE_GENAI_API_KEY=AIza...  then set LLM_VENDOR=google-genai
spring.ai.google.genai.chat.options.model=${GOOGLE_MODEL:gemini-2.0-flash}

# --- VulnHawk / Spring AI model selection ---
# Controls which vendor's chat auto-configuration is active.
# Valid values: ollama | openai | anthropic | google-genai
# Set LLM_VENDOR env var at runtime (e.g. export LLM_VENDOR=openai)
spring.ai.model.chat=${LLM_VENDOR:google-genai}
vulnhawk.llm.vendor=${LLM_VENDOR:google-genai}

# Disable non-chat model types - this scanner only uses chat
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.moderation=none

# Optional GitHub token for changelog fetching (avoids rate limits)
vulnhawk.github.token=${GITHUB_TOKEN:}

# --- Long-running scan support (scans can take 3-8 min) ---
spring.mvc.async.request-timeout=600000

# --- Static resources ---
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/static/**

# --- MCP Server ---
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=vulnhawk
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.description=VulnHawk - Java/Kotlin Vulnerability Scanner powered by Spring AI
spring.ai.mcp.server.type=SYNC
