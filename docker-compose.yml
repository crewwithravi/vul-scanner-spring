version: '3.8'

services:

  vulnhawk:
    build: .
    container_name: vulnhawk
    restart: unless-stopped
    # No host port binding needed — cloudflared reaches it via Docker network
    expose:
      - "9090"
    environment:
      # LLM vendor — uses Ollama on the host GPU by default
      LLM_VENDOR: ${LLM_VENDOR:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3-coder:14b}
      # Optional: switch to cloud LLM by setting these env vars
      SPRING_AI_GOOGLE_GENAI_API_KEY: ${SPRING_AI_GOOGLE_GENAI_API_KEY:-}
      SPRING_AI_ANTHROPIC_API_KEY: ${SPRING_AI_ANTHROPIC_API_KEY:-}
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-}
      # GitHub token for private repos / higher rate limits
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    extra_hosts:
      # Allows container to reach Ollama running on the Linux host GPU
      - "host.docker.internal:host-gateway"
    volumes:
      - maven-cache:/home/vulnhawk/.m2
      - gradle-cache:/home/vulnhawk/.gradle
      - scan-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vulnhawk-cloudflared
    restart: unless-stopped
    # Config-file based routing — no dashboard needed
    # Credentials: cp ~/.cloudflared/c7a01e00-*.json ./cloudflared-creds.json
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared-creds.json:/etc/cloudflared/vulnhawk.json:ro
    depends_on:
      vulnhawk:
        condition: service_healthy

volumes:
  maven-cache:
  gradle-cache:
  scan-data:
